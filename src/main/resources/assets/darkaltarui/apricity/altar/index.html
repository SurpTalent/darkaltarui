<body>
<style>
    body {
        width: 100%; height: 100%; margin: 0; padding: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        padding-top: 20px;
        background: transparent;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        color: #c9b8e0;
        font-size: 10px;
        line-height: 1.3;
    }
    .panel {
        position: relative; z-index: 1; width: 200px;
        display: flex; flex-direction: column; align-items: center;
        background: rgba(26, 15, 40, 0.9);
        border: 2px solid #4a3060; border-radius: 5px; padding: 3px 5px;
        box-shadow: 0 0 10px rgba(74, 48, 96, 0.4), inset 0 0 12px rgba(60, 30, 90, 0.2);
    }
    .corner-tl { position: absolute; top: 2px; left: 2px; width: 5px; height: 5px; border-top: 1px solid #6b4c8a; border-left: 1px solid #6b4c8a; }
    .corner-tr { position: absolute; top: 2px; right: 2px; width: 5px; height: 5px; border-top: 1px solid #6b4c8a; border-right: 1px solid #6b4c8a; }
    .corner-bl { position: absolute; bottom: 2px; left: 2px; width: 5px; height: 5px; border-bottom: 1px solid #6b4c8a; border-left: 1px solid #6b4c8a; }
    .corner-br { position: absolute; bottom: 2px; right: 2px; width: 5px; height: 5px; border-bottom: 1px solid #6b4c8a; border-right: 1px solid #6b4c8a; }
    .header { display: flex; flex-direction: row; align-items: center; justify-content: flex-start; gap: 3px; margin-bottom: 1px; width: 100%; padding-left: 2px; }
    .header-icon { width: 12px; height: 12px; }
    .header-icon slot { --aui-slot-size: 11px; }
    .title-text { color: #c4a8e6; font-size: 12px; font-weight: bold; margin-left: 68px; }
    .subtitle { color: #8a70b8; font-size: 9px; margin-bottom: 2px; }
    .divider { width: 92%; height: 1px; background: rgba(107,76,138,0.35); margin: 2px 0; }
    .slot-row-label { color: #9b80c0; font-size: 9px; margin-bottom: 1px; align-self: flex-start; padding-left: 1px; }

    .altar-grid-wrapper { position: relative; width: 88px; height: 88px; margin: 2px 0; align-self: flex-start; margin-left: -2px; }
    .altar-center { position: absolute; left: 36px; top: 36px; width: 16px; height: 16px; z-index: 0; }
    .altar-center slot { --aui-slot-size: 16px; --aui-slot-interactive: 0; }

    #saved_data { position: relative; width: 88px; height: 88px; --aui-slot-size: 16px; }
    .s0  { position: absolute; left: 18px; top: 0;    }
    .s1  { position: absolute; left: 36px; top: 0;    }
    .s2  { position: absolute; left: 54px; top: 0;    }
    .s3  { position: absolute; left: 0;    top: 18px; }
    .s4  { position: absolute; left: 72px; top: 18px; }
    .s5  { position: absolute; left: 0;    top: 36px; }
    .s6  { position: absolute; left: 72px; top: 36px; }
    .s7  { position: absolute; left: 0;    top: 54px; }
    .s8  { position: absolute; left: 72px; top: 54px; }
    .s9  { position: absolute; left: 18px; top: 72px; }
    .s10 { position: absolute; left: 36px; top: 72px; }
    .s11 { position: absolute; left: 54px; top: 72px; }

    .altar-preview-row { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 2px; justify-content: flex-start; width: 100%; padding-left: 1px; }
    .altar-preview-item { color: #9b80c0; font-size: 8px; background: rgba(40,25,60,0.5); border: 1px solid rgba(74,48,96,0.4); border-radius: 1px; padding: 0 2px; }
    .altar-preview-empty { color: #5a4080; font-size: 8px; background: rgba(20,10,30,0.4); border: 1px dashed rgba(40,25,60,0.3); border-radius: 1px; padding: 0 2px; }
    .ritual-info { display: block; color: #ffcc66; font-size: 9px; width: 100%; margin-bottom: 2px; text-align: center; }

    #player { --aui-slot-size: 18px; }

    .btn-area { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 4px; margin-top: 2px; padding-top: 2px; border-top: 1px solid #4a3060; width: 100%; }
    .magic-btn { padding: 2px 10px; background: #3d1f5c; color: #d4b8f0; border: 1px solid #6b4c8a; border-radius: 2px; font-size: 10px; font-weight: bold; cursor: pointer; }
    .close-btn { padding: 2px 6px; background: #2a1a35; color: #9b80c0; border: 1px solid #4a3060; border-radius: 2px; font-size: 9px; cursor: pointer; }
</style>

<div class="panel">
    <div class="corner-tl"></div><div class="corner-tr"></div><div class="corner-bl"></div><div class="corner-br"></div>

    <div class="header">
        <div class="header-icon"><slot interactive="0">{id:"goety:dark_altar",Count:1b}</slot></div>
        <span class="title-text">祭坛魔力操控</span>
    </div>
    <span class="subtitle" id="altar-count">已连接祭坛底座</span>
    <div class="divider"></div>

    <div class="altar-preview-row" id="altar-preview"></div>
    <span class="ritual-info" id="ritual-info"></span>
    <span class="slot-row-label">周围祭坛（Goety 菱形 · 12 格）</span>

    <div class="altar-grid-wrapper">
        <div class="altar-center">
            <slot interactive="0" render="item">{id:"goety:dark_altar",Count:1b}</slot>
        </div>
        <container id="saved_data" primary="true" bind="saved_data" size="12">
            <slot slot-index="0"  class="s0"></slot>
            <slot slot-index="1"  class="s1"></slot>
            <slot slot-index="2"  class="s2"></slot>
            <slot slot-index="3"  class="s3"></slot>
            <slot slot-index="4"  class="s4"></slot>
            <slot slot-index="5"  class="s5"></slot>
            <slot slot-index="6"  class="s6"></slot>
            <slot slot-index="7"  class="s7"></slot>
            <slot slot-index="8"  class="s8"></slot>
            <slot slot-index="9"  class="s9"></slot>
            <slot slot-index="10" class="s10"></slot>
            <slot slot-index="11" class="s11"></slot>
        </container>
    </div>

    <div class="divider"></div>

    <span class="slot-row-label">玩家背包</span>
    <container id="player" bind="player"></container>

    <div class="btn-area">
        <span class="magic-btn" id="btn-commit">魔力操控</span>
        <span class="close-btn" id="btn-close">关闭</span>
    </div>
</div>

<script>
(function() {
    var btnCommit = document.getElementById('btn-commit')
    if (btnCommit) btnCommit.addEventListener('mousedown', function() {
        ApricityUI.closeScreen()
    })
    var btnClose = document.getElementById('btn-close')
    if (btnClose) btnClose.addEventListener('mousedown', function() {
        ApricityUI.closeScreen()
    })
})()
</script>
</body>
