<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: "Microsoft YaHei"; }
.panel { width: 260px; background: #1a1a2e; border: 2px solid #c9a03a; border-radius: 12px; padding: 16px; color: #fff; }
h2 { color: #c9a03a; text-align: center; margin-bottom: 8px; }
.bal { text-align: center; color: #ffd700; font-size: 18px; margin-bottom: 12px; }
.row { display: flex; gap: 8px; margin-bottom: 8px; }
.btn { flex: 1; background: #2a2a4a; border: 1px solid #c9a03a; color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; }
.btn:hover { background: #3a3a5a; border-color: #ffd700; }
input { flex: 1; background: #111; border: 1px solid #555; color: #fff; padding: 6px; border-radius: 4px; text-align: center; }
.result { color: #aaa; font-size: 12px; text-align: center; margin-top: 8px; min-height: 16px; }
.back { text-align: center; margin-top: 10px; }
.back a { color: #888; text-decoration: none; }
</style>
</head>
<body>
<div class="panel">
  <h2>🏦 银行</h2>
  <div class="bal" id="bal">余额: -- 交子</div>
  
  <div class="row">
    <input id="amt" type="number" min="1" value="1" placeholder="金额">
  </div>
  <div class="row">
    <div class="btn" onclick="bank('deposit')">📥 存款</div>
    <div class="btn" onclick="bank('withdraw')">📤 取款</div>
  </div>
  <div class="row">
    <div class="btn" onclick="bank('transfer')">💸 转账</div>
    <div class="btn" onclick="bank('balance')">🔄 刷新</div>
  </div>
  <div class="result" id="result"></div>
  <div class="back"><a href="#" onclick="aui.open('main')">← 返回</a></div>
</div>
<script>
var bal = parseInt(aui.data("balance")) || 0;
document.getElementById("bal").textContent = "余额: " + bal + " 交子";

function bank(action) {
  var amt = parseInt(document.getElementById("amt").value) || 0;
  if (amt <= 0) { show("请输入金额"); return; }
  aui.rpc("bank", action, amt, function(resp) {
    show(resp.msg || "完成");
    if (resp.balance !== undefined) {
      document.getElementById("bal").textContent = "余额: " + resp.balance + " 交子";
    }
  });
}

function show(msg) {
  document.getElementById("result").textContent = msg;
  setTimeout(function(){ document.getElementById("result").textContent = ""; }, 3000);
}
</script>
</body>
</html>
